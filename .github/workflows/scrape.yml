name: Scrape EdUpage

on:
  schedule:
    - cron: "0 6 * * 0" # domingo 03:00 BRT (06:00 UTC)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run scrape
      - name: Abrir PR com diff (se houver)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/public/data
          git diff --cached --quiet && exit 0

          EXISTING=$(gh pr list --state open --search "chore(data): atualiza dados do EdUpage" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING já aberto — atualizando branch"
            BRANCH=$(gh pr view "$EXISTING" --json headRefName --jq '.headRefName')
            git checkout -B "$BRANCH"
            git commit -m "chore(data): atualiza dados do EdUpage"
            git push -u origin "$BRANCH"
            gh pr comment "$EXISTING" --body "Scrape automático atualizado ($(date -u +%Y-%m-%dT%H:%MZ))."
            exit 0
          fi

          BRANCH="data/scrape-$(date -u +%Y%m%d-%H%M)"
          git checkout -b "$BRANCH"
          git commit -m "chore(data): atualiza dados do EdUpage"
          git push -u origin "$BRANCH"

          gh pr create \
            --title "chore(data): atualiza dados do EdUpage" \
            --body "Scrape automático semanal. CI deve passar antes do merge." \
            --base main \
            --head "$BRANCH" \
            --label scraper
      - name: Abrir issue em falha
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Scraper EdUpage falhou";
            const body = `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nOs dados anteriores permanecem intactos. Verificar se o EdUpage mudou o formato dos endpoints (ver scraper/README.md).`;
            const { data: issues } = await github.rest.issues.listForRepo({ ...context.repo, state: "open", labels: "scraper" });
            const existing = issues.find(i => i.title === title);
            if (existing) await github.rest.issues.createComment({ ...context.repo, issue_number: existing.number, body });
            else await github.rest.issues.create({ ...context.repo, title, body, labels: ["scraper"] });
