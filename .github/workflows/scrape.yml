name: Scrape EdUpage

on:
  schedule:
    - cron: "0 6 * * 0" # domingo 03:00 BRT (06:00 UTC)
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run scrape
      - name: Commit diff (se houver)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/public/data
          git diff --cached --quiet || (git commit -m "chore(data): atualiza dados do EdUpage" && git push)
      - name: Abrir issue em falha
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Scraper EdUpage falhou";
            const body = `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nOs dados anteriores permanecem intactos. Verificar se o EdUpage mudou o formato dos endpoints (ver scraper/README.md).`;
            const { data: issues } = await github.rest.issues.listForRepo({ ...context.repo, state: "open", labels: "scraper" });
            const existing = issues.find(i => i.title === title);
            if (existing) await github.rest.issues.createComment({ ...context.repo, issue_number: existing.number, body });
            else await github.rest.issues.create({ ...context.repo, title, body, labels: ["scraper"] });
